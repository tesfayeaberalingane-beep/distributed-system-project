<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Submission Dashboard</title>
    <link rel="stylesheet" href="css/user.css">
</head>
<body>
    <div class="container job-dashboard">
        <header>
            <h1>Client Dashboard</h1>
            <p>Welcome, <span id="usernameDisplay">User</span>! | <a href="#" id="logoutBtn">Logout</a></p>
        </header>
        
        <section class="card">
            <h2>Submit a New Job</h2>
            <form id="jobSubmissionForm">
                <input type="text" id="jobTitle" placeholder="Job Title (e.g., Data Processing Run)" required>
                <textarea id="jobDescription" placeholder="Detailed description of the task or input parameters..." rows="4" required></textarea>
                
                <label for="jobPriority">Priority:</label>
                <select id="jobPriority" required>
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
                <div class="form-group" style="margin-top: 15px;">
    <label for="max_runtime">Max Runtime (Seconds):</label>
    <input type="number" id="max_runtime" class="form-control" placeholder="Default: 3600 (1 hour)" min="10">
</div>
                <button type="submit">Submit Job to Server</button>
                <p id="jobMessage" class="message"></p>
            </form>
        </section>

        <section class="card job-history">
            <h2>Job History & Status</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Submitted At</th>
                        <th>Result</th>
                    </tr>
                </thead>
                <tbody id="jobTableBody">
                    <tr><td colspan="6">Loading jobs...</td></tr>
                </tbody>
            </table>
        </section>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/client.js"></script>
    <script>
        // Check authentication and display username on load
        const storedRole = localStorage.getItem('role');
        const storedUsername = localStorage.getItem('username');

        if (!storedRole || storedRole !== 'user') {
            window.location.href = 'index.html'; // Redirect if not logged in or not a user
        } else {
            document.getElementById('usernameDisplay').textContent = storedUsername;
        }
        
        // Load job logic from client.js (will be updated)
    </script>
</body>
</html>
