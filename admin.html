<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Monitoring Dashboard</title>
    <link rel="stylesheet" href="css/admin1.css">
</head>
<body>
    <div class="container job-dashboard">
        <header>
            <h1>Admin Monitoring Dashboard</h1>
            <p>System Administrator | <a href="#" id="logoutBtn">Logout</a></p>
        </header>

        <section class="card stats-overview">
            <h2>System Summary</h2>
            <div class="stats-grid">
                <div>Total Jobs: <span id="totalJobs">0</span></div>
                <div>Pending: <span id="pendingJobs">0</span></div>
                <div>Running: <span id="runningJobs">0</span></div>
                <div>Completed: <span id="completedJobs">0</span></div>
                <div>Failed: <span id="failedJobs">0</span></div>
            </div>
        </section>

        <section class="card job-queue">
            <h2>All Jobs Queue</h2>
            <p id="adminMessage" class="message"></p>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th>Title</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Submitted At</t>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="adminJobTableBody">
                    <tr><td colspan="7">Loading all jobs...</td></tr>
                </tbody>
            </table>
        </section>
        
        <div id="jobModal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <h3>Update Job Status: Job #<span id="modalJobId"></span></h3>
                <form id="adminUpdateForm">
                    <input type="hidden" id="modalJobIdInput">
                    <label for="newStatus">New Status:</label>
                    <select id="newStatus" required>
                        <option value="pending">Pending</option>
                        <option value="running">Running</option>
                        <option value="completed">Completed</option>
                        <option value="failed">Failed</option>
                    </select>
                    <label for="newResult">Result/Note (Optional):</label>
                    <textarea id="newResult" rows="3"></textarea>
                    <button type="submit">Apply Status Change</button>
                </form>
            </div>
        </div>

    </div>
    
    <script src="js/config.js"></script>
    <script src="js/admin.js"></script> 
    <script>
        // Initial authentication check for admin
        const storedRole = localStorage.getItem('role');

        if (!storedRole || storedRole !== 'admin') {
            window.location.href = 'index.html'; // Redirect if not logged in or not an admin
        }
        
        // Logout button handler (reusing logout.php endpoint)
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
             e.preventDefault();
             await fetch(API_BASE_URL + 'logout.php'); 
             localStorage.removeItem('role');
             localStorage.removeItem('username');
             window.location.href = 'index.html';
        });
    </script>
</body>
</html>
