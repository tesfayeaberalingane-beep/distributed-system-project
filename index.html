<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributed Job Scheduler - Login</title>
    <link rel="stylesheet" href="css/index.css">
    <script src="js/client.js"></script>
</head>
<body>
    <div class="container">
        <h1>Distributed Job Scheduler</h1>
        <div id="auth-form">
            <h2>Login</h2>
            <form id="loginForm">
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p>Don't have an account? <a href="#" id="showRegister">Register here</a></p>

            <h2 style="display: none;" id="registerHeader">Register</h2>
            <form id="registerForm" style="display: none;">
                <input type="text" id="register-username" placeholder="Username" required>
                <input type="password" id="register-password" placeholder="Password" required>
                <button type="submit">Register</button>
            </form>
            <p style="display: none;" id="showLoginP"><a href="#" id="showLogin">Go back to Login</a></p>

            <p id="message" class="message"></p>
        </div>
    </div>
    <script src="js/config.js"></script>
</body>
</html>
